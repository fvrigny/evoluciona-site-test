backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "assets/images"

locale: fr

collections:

  - name: "contenu"
    label: "Contenu du site"
    files:

      # ─── ACTUALITÉS ──────────────────────────────────
      - label: "Actualités"
        name: "actualites"
        file: "data.json"
        fields:
          - label: "Actualités"
            name: "actualites"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Catégorie", name: "categorie", widget: "select",
                  options: ["Intelligence Artificielle", "Success Story", "Expertise", "Événement", "Partenariat", "Entreprise"] }
              - { label: "Date", name: "date", widget: "string", hint: "Ex : 15 Mai 2024" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Extrait", name: "extrait", widget: "text" }

      # ─── OFFRES D'EMPLOI ─────────────────────────────
      - label: "Offres d'emploi"
        name: "offres"
        file: "data.json"
        fields:
          - label: "Offres"
            name: "offres"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - { label: "Titre du poste", name: "titre", widget: "string" }
              - { label: "Département", name: "departement", widget: "select",
                  options: ["Design & Digital", "Intelligence Artificielle", "Consulting", "Technology", "Marketing", "Finance", "RH"] }
              - { label: "Lieu", name: "lieu", widget: "string" }
              - { label: "Type de contrat", name: "type", widget: "select",
                  options: ["CDI", "CDD", "Stage", "Alternance", "Freelance"] }
              - { label: "Niveau", name: "niveau", widget: "select",
                  options: ["Junior", "Confirmé", "Senior", "Manager", "Directeur"] }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Missions"
                name: "missions"
                widget: "list"
                field: { label: "Mission", name: "mission", widget: "string" }
              - label: "Profil recherché"
                name: "profil"
                widget: "list"
                field: { label: "Critère", name: "critere", widget: "string" }

      # ─── SERVICES ────────────────────────────────────
      - label: "Services"
        name: "services"
        file: "data.json"
        fields:
          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Sous-titre", name: "sous_titre", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - label: "Points clés"
                name: "features"
                widget: "list"
                field: { label: "Point", name: "point", widget: "string" }
